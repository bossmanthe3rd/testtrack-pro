name: CD Pipeline - Staging

on:
  push:
    [cite_start]branches: [ develop ] # Triggers strictly on merge to develop 

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      # 1. CI Build Steps [cite: 526]
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build applications
        run: pnpm build

      # 2. Run Database Migrations (Neon PostgreSQL) [cite: 528]
      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          cd apps/api
          npx prisma migrate deploy

      # 3. Deploy API to Staging (Railway) [cite: 527]
      - name: Deploy API to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "api"
          environment: "staging"

      # 4. Deploy Frontend to Staging (Vercel) [cite: 529]
      - name: Deploy Web to Vercel (Preview/Staging)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./apps/web
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 5. Run Smoke Tests [cite: 530]
      - name: Run Smoke Tests
        run: pnpm test:smoke

      # 6. Notify Team (Slack Example) [cite: 531]
      - name: Notify Team on Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always() # Runs even if previous steps fail so you know if the build broke